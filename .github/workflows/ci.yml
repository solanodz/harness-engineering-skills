name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Full verification (init.sh)
        run: ./init.sh

      - name: Verify npm package contents
        run: npm pack --dry-run
