name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: CLI help
        run: node scripts/cli.mjs help

      - name: List skills
        run: node scripts/cli.mjs list

      - name: Create and validate harness
        run: |
          node scripts/cli.mjs create --target /tmp/harness-smoke
          node scripts/cli.mjs validate --target /tmp/harness-smoke --min-score 70

      - name: Install skills to temp dir
        run: |
          node scripts/cli.mjs install --yes --force --ide cursor --dest /tmp/cursor-skills
          node scripts/cli.mjs install --yes --force --ide claude --dest /tmp/claude-skills
          node scripts/cli.mjs install --yes --force --ide codex --dest /tmp/codex-skills
          mkdir -p /tmp/project-ides && cd /tmp/project-ides
          node "$GITHUB_WORKSPACE/scripts/cli.mjs" install --yes --force --ide all --project
          test -f .cursor/skills/harness-scaffold/SKILL.md
          test -f .claude/skills/harness-scaffold/SKILL.md
          test -f .agents/skills/harness-scaffold/SKILL.md

      - name: Verify npm package contents
        run: npm pack --dry-run
