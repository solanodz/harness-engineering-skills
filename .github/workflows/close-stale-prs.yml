name: Close stale PRs

on:
  workflow_dispatch:

permissions:
  pull-requests: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const stale = [
              {
                number: 1,
                comment: 'Superseded by merged work on master (English skills, CLI, and npm publish).'
              },
              {
                number: 4,
                comment: 'Superseded by PR #3 and #5 — TUI fixes and package rename already merged.'
              }
            ];

            for (const pr of stale) {
              const { data } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              });

              if (data.state === 'open') {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: pr.comment
                });
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  state: 'closed'
                });
                core.info(`Closed PR #${pr.number}`);
              } else {
                core.info(`PR #${pr.number} already ${data.state}`);
              }
            }
